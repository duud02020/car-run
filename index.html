<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAMOS VOAR | Neon Experience</title>
    <link rel="stylesheet" href="./style.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <!-- Stats -->
            <div id="stats-panel">
                <div id="score-board">
                    <span style="font-size: 0.6rem; color: var(--neon-blue);">PONTOS</span>
                    <span id="score-value">0000</span>
                </div>
                <div id="coin-board">
                    <span style="font-size: 0.6rem; color: var(--neon-yellow);">MOEDAS</span>
                    <span id="coin-value">0</span>
                </div>
            </div>

            <!-- Start -->
            <div id="start-screen" class="overlay">
                <h1>VAMOS VOAR</h1>
                <p>Use ESPAÇO ou CLIQUE para voar!</p>
                <div class="button-group">
                    <button id="start-button">VOO LIVRE</button>
                    <button id="levels-button">NÍVEIS</button>
                    <button id="home-shop-button">AVIÁRIO</button>
                </div>
            </div>

            <!-- Game Over -->
            <div id="game-over-screen" class="overlay hidden">
                <h2>BATEU!</h2>
                <div class="final-score">PONTOS: <span id="final-score-value">0</span></div>
                <div class="coins-earned" style="margin-bottom: 20px;">MOEDAS: <span id="coins-earned-value">0</span></div>
                <div class="button-group">
                    <button id="restart-button">TENTAR DE NOVO</button>
                    <button id="shop-button">AVIÁRIO</button>
                </div>
            </div>

            <!-- Shop -->
            <div id="shop-screen" class="overlay hidden">
                <h2>AVIÁRIO NEON</h2>
                <div style="margin-bottom: 10px;">SUAS MOEDAS: <span id="shop-coin-value">0</span></div>
                <div id="skin-list"></div>
                <button id="close-shop">VOLTAR</button>
            </div>

            <!-- Levels -->
            <div id="levels-screen" class="overlay hidden">
                <h2>MAPA DE VOO</h2>
                <div id="level-list"></div>
                <button id="close-levels">VOLTAR</button>
            </div>

            <!-- Win -->
            <div id="level-win-screen" class="overlay hidden">
                <h2 style="color: var(--neon-yellow);">MISSÃO CUMPRIDA!</h2>
                <div>CONCLUÍDO COM <span id="win-score-value">0</span> PONTOS</div>
                <div style="color: var(--neon-yellow); margin: 10px 0;">+ <span id="win-coins-value">0</span> MOEDAS BÔNUS</div>
                <div class="button-group">
                    <button id="next-level-button">PRÓXIMO</button>
                    <button id="win-home-button">MENU</button>
                </div>
            </div>

        </div>
    </div>
    <script src="./v6.js?v=13"></script>
</body>
</html>
