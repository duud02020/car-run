<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Runner | Cyberpunk Experience</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="stats-panel">
                <div id="score-board">
                    <span class="label">PONTOS</span>
                    <span id="score-value">0000</span>
                </div>
                <div id="coin-board">
                    <span class="label">MOEDAS</span>
                    <span id="coin-value">0</span>
                </div>
            </div>

            <div id="start-screen" class="overlay">
                <h1>CAR RUN</h1>
                <p>Acelere, desvie dos obstáculos e domine a estrada digital.</p>
                <button id="start-button">INICIAR SISTEMA</button>
                <div class="controls-hint">
                    <span>SETAS / WASD</span>
                    <span>TOQUE (MOBILE)</span>
                </div>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h2>CONEXÃO INTERROMPIDA</h2>
                <div class="final-score">SCORE FINAL: <span id="final-score-value">0</span></div>
                <div class="coins-earned">MOEDAS COLETADAS: <span id="coins-earned-value">0</span></div>
                <div class="button-group">
                    <button id="restart-button">RECONECTAR</button>
                    <button id="shop-button">GARAGEM / LOJA</button>
                </div>
            </div>

            <div id="shop-screen" class="overlay hidden">
                <h2>GARAGEM NEON</h2>
                <div class="current-coins">SUAS MOEDAS: <span id="shop-coin-value">0</span></div>
                <div id="skin-list">
                    <!-- Skins serão geradas via JS -->
                </div>
                <button id="close-shop">VOLTAR</button>
            </div>
        </div>
    </div>
    <script src="./game.js"></script>
</body>
</html>
