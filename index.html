<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAMOS VOAR | Neon Experience</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="stats-panel">
                <div id="score-board">
                    <span class="label">PONTOS</span>
                    <span id="score-value">0000</span>
                </div>
                <div id="coin-board">
                    <span class="label">MOEDAS</span>
                    <span id="coin-value">0</span>
                </div>
            </div>

            <div id="start-screen" class="overlay">
                <h1>VAMOS VOAR</h1>
                <p>Use ESPAÇO ou CLIQUE para voar entre os canos neon!</p>
                <div class="button-group">
                    <button id="start-button">INICIAR VOO</button>
                    <button id="home-shop-button">AVIÁRIO</button>
                </div>
                <div class="controls-hint">
                    <span>ESPAÇO / CLIQUE</span>
                    <span>W / SETA CIMA</span>
                </div>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h2>BATEU!</h2>
                <div class="final-score">PONTUAÇÃO: <span id="final-score-value">0</span></div>
                <div class="coins-earned">MOEDAS: <span id="coins-earned-value">0</span></div>
                <div class="button-group">
                    <button id="restart-button">TENTAR DE NOVO</button>
                    <button id="shop-button">AVIÁRIO</button>
                </div>
            </div>

            <div id="shop-screen" class="overlay hidden">
                <h2>AVIÁRIO NEON</h2>
                <div class="current-coins">SUAS MOEDAS: <span id="shop-coin-value">0</span></div>
                <div id="skin-list">
                    <!-- Skins via JS -->
                </div>
                <button id="close-shop">VOLTAR</button>
            </div>
        </div>
    </div>
    <!-- Forçando a leitura de um novo arquivo para limpar o cache de preços -->
    <script src="./bird.js"></script>
</body>
</html>
